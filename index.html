<!DOCTYPE html><html lang='tr'><head><meta charset='utf-8'>
<meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Kristal Snake v1.4.0</title>
<style>
body{margin:0;background:#050816;color:#9ef;font-family:Arial;display:flex;justify-content:center;align-items:center;min-height:100vh}
#menu,#game{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh}
button,select{padding:12px 18px;margin:8px;border-radius:10px;border:none;font-size:18px}
button{background:#0af;color:#fff}
canvas{background:#0b1025;border:2px solid #0ff;display:none}
#hud{display:none;text-align:center;padding:8px}
</style></head><body>
<div id='menu'>
<h1>💎 KRİSTAL SNAKE <small>v1.4.0</small></h1>
<select id='skin'><option value='#39f'>💙 Neon Mavi</option><option value='#0f0'>🟩 Yeşil</option><option value='#f60'>🔥 Ateş</option></select>
<button onclick='startGame()'>▶ Başlat</button><button onclick="showSkins()">🎨 Skinler</button><button onclick="showAchievements()">🏆 Başarımlar</button>
<p>WASD / Ok Tuşları • ESC=Menü</p>
</div>
<div id='hud'>⭐ Skor: <span id='score'>0</span> | 🏆 High Score: <span id='highScore'>0</span></div>
<canvas id='cv' width='400' height='400'></canvas>
<script>
const menu=document.getElementById('menu'),hud=document.getElementById('hud'),cv=document.getElementById('cv'),ctx=cv.getContext('2d');
let color='#39f',x=200,y=200,score=0;let highScore=Number(localStorage.getItem('highScore'))||0;const scoreEl=document.getElementById('score');document.addEventListener('DOMContentLoaded',()=>document.getElementById('highScore').textContent=highScore);function addScore(n=1){score+=n;scoreEl.textContent=score;if(score>highScore){highScore=score;localStorage.setItem('highScore',highScore);document.getElementById('highScore').textContent=highScore;}if(score>=10&&!localStorage.getItem('first10')){localStorage.setItem('first10','1');alert('🏆 Başarım Açıldı: 🌱 İlk Adım');}if(score>=100&&!localStorage.getItem('gold100')){localStorage.setItem('gold100','1');alert('🏆 Başarım Açıldı: 🥇 Altın Yılan');}}
const achievements=[['first10','🌱 İlk Adım',10],['gold100','🥇 Altın Yılan',100]];
function showAchievements(){let msg='🏆 Başarımlar\n\n';for(const a of achievements){msg+=(localStorage.getItem(a[0])?'✅ ':'⬜ ')+a[1]+' ('+a[2]+' skor)\n';}alert(msg);}

let crystal={x:80,y:80};let tail=[];let tailLen=0;
function draw(){ctx.fillStyle='#0b1025';ctx.fillRect(0,0,400,400);
ctx.strokeStyle='#133';for(let i=0;i<400;i+=40){ctx.strokeRect(i,0,40,400);ctx.strokeRect(0,i,400,40);}
tail.forEach(s=>{ctx.fillStyle=color;ctx.beginPath();ctx.arc(s.x+10,s.y+10,10,0,Math.PI*2);ctx.fill();});ctx.fillStyle='#0ff';ctx.beginPath();ctx.arc(crystal.x+10,crystal.y+10,8,0,Math.PI*2);ctx.fill();ctx.shadowColor=color;ctx.shadowBlur=12;ctx.fillStyle=color;ctx.beginPath();ctx.arc(x+10,y+10,10,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(x+7,y+7,2,0,Math.PI*2);ctx.arc(x+13,y+7,2,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;if(x===crystal.x&&y===crystal.y){addScore();tailLen++;crystal.x=Math.floor(Math.random()*20)*20;crystal.y=Math.floor(Math.random()*20)*20;}}
let dir='right',loop=null;function tick(){tail.unshift({x,y});while(tail.length>tailLen)tail.pop();if(dir=='up')y-=20;if(dir=='down')y+=20;if(dir=='left')x-=20;if(dir=='right')x+=20;if(x<0||x>380||y<0||y>380){clearInterval(loop);alert('Oyun Bitti!');menu.style.display='flex';hud.style.display='none';cv.style.display='none';return;}for(const s of tail){if(s.x===x&&s.y===y){clearInterval(loop);alert('Oyun Bitti!');menu.style.display='flex';hud.style.display='none';cv.style.display='none';return;}}draw();}function move(d){dir=d;}
function startGame(){x=200;y=200;tail=[];tailLen=0;dir='right';color=document.getElementById('skin').value;score=0;scoreEl.textContent=0;document.getElementById('highScore').textContent=highScore;menu.style.display='none';hud.style.display='block';cv.style.display='block';document.getElementById('touch').style.display='block';if(loop)clearInterval(loop);loop=setInterval(tick,180);draw();}
onkeydown=e=>{
if(menu.style.display!=='none')return;
if(e.key==='Escape'){menu.style.display='flex';hud.style.display='none';cv.style.display='none';return;}
if((e.key==='ArrowUp'||e.key==='w')&&dir!=='down')dir='up';
if((e.key==='ArrowDown'||e.key==='s')&&dir!=='up')dir='down';
if((e.key==='ArrowLeft'||e.key==='a')&&dir!=='right')dir='left';
if((e.key==='ArrowRight'||e.key==='d')&&dir!=='left')dir='right';
if(x<0||x>380||y<0||y>380){clearInterval(loop);alert('Oyun Bitti!');menu.style.display='flex';hud.style.display='none';cv.style.display='none';return;}for(const s of tail){if(s.x===x&&s.y===y){clearInterval(loop);alert('Oyun Bitti!');menu.style.display='flex';hud.style.display='none';cv.style.display='none';return;}}draw();
}
function showAchievements(){menu.style.display='none';document.getElementById('achievementsPage').style.display='block';}function backToMenu(){document.getElementById('achievementsPage').style.display='none';menu.style.display='flex';}function showSkins(){menu.style.display='none';document.getElementById('skinsPage').style.display='block';}function backToMenuFromSkin(){document.getElementById('skinsPage').style.display='none';menu.style.display='flex';}</script>
<div id="touch" style="display:none;position:fixed;bottom:10px;left:50%;transform:translateX(-50%);text-align:center;">
<button onclick="move('up')">⬆️</button><br>
<button onclick="move('left')">⬅️</button>
<button onclick="move('down')">⬇️</button>
<button onclick="move('right')">➡️</button>
</div>
<div id='achievementsPage' style='display:none;position:fixed;inset:0;background:#050816;color:#9ef;padding:20px;overflow-y:auto'>
<h1>🏆 Başarımlar</h1>
<div style='border:1px solid #0ff;padding:10px;border-radius:10px;margin:8px'>✅ 🌱 İlk Adım - 10 Skor</div>
<div style='border:1px solid #0ff;padding:10px;border-radius:10px;margin:8px'>🔒 🥇 Altın Yılan - 100 Skor</div>
<button onclick='backToMenu()'>⬅ Ana Menü</button>
</div>
<div id='skinsPage' style='display:none;position:fixed;inset:0;background:#050816;color:#9ef;padding:20px;overflow:auto'>
<h1>🎨 Skinler</h1>
<div style='border:1px solid #0ff;padding:10px;margin:8px;border-radius:10px'>✅ 💙 Neon Mavi (Başlangıç)<br><button onclick="color='#39f';backToMenuFromSkin()">Kuşan</button></div>
<div style='border:1px solid #0ff;padding:10px;margin:8px;border-radius:10px'>🔒 🌌 Kozmik Yılan<div style='border:1px solid #0ff;padding:10px;margin:8px;border-radius:10px'>🔒 🥇 Altın Yılan</div>
<button onclick='backToMenuFromSkin()'>⬅ Ana Menü</button></div>
</body></html>
